<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2進数カフェ「バイナリバリスタ」</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- 湯気エフェクト用 -->
        <div id="steam-effect" class="steam-effect hidden"></div>

        <!-- TITLE SCREEN -->
        <div id="screen-title" class="screen active">
            <div class="pixel-border">
                <img id="title-img" src="./binary_barista.png" alt="ボクバナナバリスタ">
            </div>
            <h1 class="dungeon-title">BINARY CAFE</h1>
            <h2>2進数カフェ</h2>
            <p class="subtitle">0と1の注文をさばけ！</p>
            <button class="dungeon-btn start-btn" onclick="startGame()">☕ カフェをオープンする</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="screen-game" class="screen">
            <div class="game-header">
                <div class="hp-bar" id="hp-bar">❤️❤️❤️</div>
                <div class="header-right">
                    <span class="stage-info" id="stage-title"></span>
                    <span class="timer-box" id="timer">--</span>
                </div>
            </div>
            <div id="instruction-box" class="instruction-box"></div>
            
            <div id="panel-main" class="stage-panel active">
                <div class="panel-header">
                    <div id="counter" class="counter-text"></div>
                    <!-- お助け機能 -->
                    <button id="hint-btn" class="dungeon-btn hint-btn" onclick="useHint()">💡 店長の裏メニュー (Time -5s)</button>
                </div>

                <div class="gate-card" id="gate-card">
                    <!-- 視覚ヒント：コーヒーカップと位 -->
                    <div id="visual-hint-box" class="visual-hint-box"></div>
                    <div id="question-text"></div>
                </div>
                <div id="options" class="quiz-options"></div>
            </div>

            <div id="feedback-overlay" class="feedback-overlay hidden">
                <div id="feedback-title" class="feedback-title"></div>
                <p id="feedback-text" class="feedback-text"></p>
                <button class="dungeon-btn" id="next-btn" onclick="closeFeedback()">次の注文へ ▶</button>
            </div>
        </div>

        <!-- GAMEOVER SCREEN -->
        <div id="screen-gameover" class="screen">
            <h1 class="gameover-title">GAME OVER</h1>
            <p class="gameover-subtitle" id="gameover-reason">店は潰れた…</p>
            <img src="./binary_barista.png" alt="Game Over" style="width:100px; filter: grayscale(100%); margin-bottom: 20px;">
            <button class="dungeon-btn" onclick="startGame()">↻ リトライ</button>
        </div>

        <!-- CLEAR SCREEN -->
        <div id="screen-clear" class="screen">
            <img id="clear-img" src="./binary_victory.png" alt="営業終了">
            <h1 class="clear-title">SHIFT COMPLETED!</h1>
            <!-- 称号 -->
            <h2 id="rank-display" class="rank-display"></h2>
            <p class="clear-subtitle">すべての注文を完璧にさばいた！</p>
            <div id="score-display" class="score-display"></div>
            
            <div class="password-box">
                <p>🗝️ Google Classroomに「あいことば」を入力して報告しよう</p>
                <p class="password-text" id="password-text"></p>
            </div>

            <div class="review-section">
                <h3 class="review-title">📜 クレーム記録（間違えた問題）</h3>
                <div id="review-area"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
